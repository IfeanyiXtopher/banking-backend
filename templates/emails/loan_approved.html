<table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0">
  <tr>
    <td>
      <p
        style="
          margin: 0 0 8px;
          font-size: 12px;
          font-weight: 700;
          letter-spacing: 0.14em;
          text-transform: uppercase;
          color: {{ accent_color }};
        "
      >
        Loan application
      </p>
      <h1 style="margin: 0 0 16px; font-size: 24px; font-weight: 700; color: {{ primary_color }}">
        Congratulations, {{ user.full_name }}!
      </h1>
      <p style="margin: 0 0 20px; font-size: 15px; line-height: 1.65; color: #4b5563">
        Your loan application has been <strong style="color: #059669">approved</strong>.
        {% if product_name %}Product: <strong>{{ product_name }}</strong>.{% endif %}
      </p>
    </td>
  </tr>
  <tr>
    <td
      style="
        background-color: #ecfdf5;
        border: 1px solid #a7f3d0;
        border-left: 4px solid #10b981;
        border-radius: 10px;
        padding: 18px 20px;
      "
    >
      <p style="margin: 0; font-size: 14px; line-height: 1.6; color: #065f46">
        Sign in to SafaPay to complete payout steps and review your loan terms.
      </p>
    </td>
  </tr>
  {% if sign_in_url %}
  <tr>
    <td align="center" style="padding: 24px 0 8px">
      <table role="presentation" cellpadding="0" cellspacing="0" border="0">
        <tr>
          <td align="center" bgcolor="{{ primary_color }}" style="background-color: {{ primary_color }}; border-radius: 8px">
            <a
              href="{{ sign_in_url }}"
              target="_blank"
              style="display: inline-block; padding: 14px 28px; font-size: 15px; font-weight: 700; color: #fff; text-decoration: none"
            >
              Sign in to SafaPay
            </a>
          </td>
        </tr>
      </table>
    </td>
  </tr>
  {% endif %}
</table>
