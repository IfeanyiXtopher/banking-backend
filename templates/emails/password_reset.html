<table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0">
  <tr>
    <td>
      <p
        style="
          margin: 0 0 8px;
          font-size: 12px;
          font-weight: 700;
          letter-spacing: 0.14em;
          text-transform: uppercase;
          color: {{ accent_color }};
        "
      >
        Password reset
      </p>
      <h1 style="margin: 0 0 16px; font-size: 24px; font-weight: 700; color: {{ primary_color }}">
        Hi {{ user.full_name }},
      </h1>
      <p style="margin: 0 0 24px; font-size: 15px; line-height: 1.65; color: #4b5563">
        We received a request to reset your SafaPay password. Use the link below — it expires in
        <strong>1 hour</strong>.
      </p>
    </td>
  </tr>
  <tr>
    <td align="center" style="padding-bottom: 24px">
      <table role="presentation" cellpadding="0" cellspacing="0" border="0">
        <tr>
          <td align="center" bgcolor="{{ primary_color }}" style="background-color: {{ primary_color }}; border-radius: 8px">
            <a
              href="{{ token }}"
              target="_blank"
              style="
                display: inline-block;
                padding: 14px 28px;
                font-size: 15px;
                font-weight: 700;
                color: #ffffff;
                text-decoration: none;
              "
            >
              Reset password
            </a>
          </td>
        </tr>
      </table>
    </td>
  </tr>
  <tr>
    <td
      style="
        background-color: #fafafa;
        border: 1px solid #e5e7eb;
        border-radius: 8px;
        padding: 14px 16px;
      "
    >
      <p style="margin: 0 0 8px; font-size: 12px; font-weight: 600; color: #6b7280">Or copy this link</p>
      <p style="margin: 0; font-size: 12px; word-break: break-all; color: {{ primary_color }}">{{ token }}</p>
    </td>
  </tr>
  <tr>
    <td style="padding-top: 20px">
      <p style="margin: 0; font-size: 13px; line-height: 1.55; color: #6b7280">
        If you did not request a password reset, you can ignore this email. Your password will not change.
      </p>
    </td>
  </tr>
</table>
