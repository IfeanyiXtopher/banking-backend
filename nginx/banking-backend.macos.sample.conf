# Homebrew Nginx: copy or symlink into servers/ and include from nginx.conf.
# Typical paths:
#   /opt/homebrew/etc/nginx/servers/banking-backend.conf   (Apple Silicon)
#   /usr/local/etc/nginx/servers/banking-backend.conf      (Intel)
#
# Then: sudo nginx -t && sudo nginx -s reload
#
# Requires Gunicorn on 127.0.0.1:8000 (./scripts/manage_services.sh start).

upstream banking_backend {
    server 127.0.0.1:8000;
}

server {
    listen 8080;
    server_name localhost;

    client_max_body_size 20M;

    location /api/ {
        proxy_pass http://banking_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location /api/auth/login/ {
        proxy_pass http://banking_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /ws/ {
        proxy_pass http://banking_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 300s;
    }

    location /static/ {
        alias REPLACE_WITH_REPO_ROOT/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    location /media/ {
        alias REPLACE_WITH_REPO_ROOT/media/;
        add_header Content-Disposition "attachment";
    }

    location /django-admin/ {
        proxy_pass http://banking_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/schema/ {
        proxy_pass http://banking_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/docs/ {
        proxy_pass http://banking_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/redoc/ {
        proxy_pass http://banking_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
