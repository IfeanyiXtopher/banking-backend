# SafaPay API — native deployment (Gunicorn on 127.0.0.1:8000)
# Domain: api.safapaygroup.com
#
# Ubuntu install:
#   sudo ln -sf /opt/banking-backend/nginx/nginx.conf /etc/nginx/nginx.conf
#   sudo nginx -t && sudo systemctl reload nginx
#
# First-time TLS (before HTTPS block works):
#   sudo mkdir -p /var/www/certbot
#   sudo certbot certonly --webroot -w /var/www/certbot -d api.safapaygroup.com
#   Then reload nginx.

worker_processes auto;
pid /run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    tcp_nopush      on;
    keepalive_timeout 65;

    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;

    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;

    gzip on;
    gzip_vary on;
    gzip_types text/plain application/json application/javascript text/css text/xml;

    upstream django {
        server 127.0.0.1:8000;
        keepalive 32;
    }

    # HTTP — ACME + redirect to HTTPS
    server {
        listen 80;
        listen [::]:80;
        server_name api.safapaygroup.com;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS — API, admin, WebSockets
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name api.safapaygroup.com;

        ssl_certificate     /etc/letsencrypt/live/api.safapaygroup.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/api.safapaygroup.com/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

        client_max_body_size 20M;

        # Django admin (not under /api/)
        location /django-admin/ {
            proxy_pass http://django;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
        }

        # Stricter rate limit on login (must be before /api/)
        location /api/auth/login/ {
            limit_req zone=auth burst=3 nodelay;
            proxy_pass http://django;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
        }

        location /api/ {
            limit_req zone=api burst=10 nodelay;
            proxy_pass http://django;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
        }

        location /ws/ {
            proxy_pass http://django;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
        }

        location /static/ {
            alias /opt/banking-backend/staticfiles/;
            expires 30d;
            add_header Cache-Control "public, no-transform";
        }

        location /media/ {
            alias /opt/banking-backend/media/;
            add_header Content-Disposition "attachment";
        }

        location ~* \.(php|asp|aspx|jsp)$ {
            return 404;
        }
    }
}
