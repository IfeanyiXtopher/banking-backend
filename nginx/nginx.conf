worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout 65;

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;

    gzip on;
    gzip_types text/plain application/json application/javascript text/css;

    upstream django {
        # Gunicorn is expected to listen on the same host (native deployment).
        # Keep this in sync with `gunicorn.conf.py` (bind).
        server 127.0.0.1:8000;
    }

    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl http2;
        server_name _;

        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        # Security headers
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

        client_max_body_size 20M;

        # API
        location /api/ {
            limit_req zone=api burst=10 nodelay;
            proxy_pass http://django;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
        }

        # Auth endpoints — stricter rate limiting
        location /api/auth/login/ {
            limit_req zone=auth burst=3 nodelay;
            proxy_pass http://django;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # WebSocket
        location /ws/ {
            proxy_pass http://django;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 300s;
        }

        # Static files
        location /static/ {
            # Edit to your deployed path (see docs/deployment.md).
            alias /opt/banking-backend/staticfiles/;
            expires 30d;
            add_header Cache-Control "public, no-transform";
        }

        # Media files — restricted (no directory listing)
        location /media/ {
            # Edit to your deployed path (see docs/deployment.md).
            alias /opt/banking-backend/media/;
            add_header Content-Disposition "attachment";
            # Deny direct access to sensitive dirs; access is via signed tokens in Django
        }

        # Block common attack vectors
        location ~* \.(php|asp|aspx|jsp)$ {
            return 404;
        }
    }
}
